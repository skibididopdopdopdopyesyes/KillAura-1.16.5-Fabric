name: Build JAR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.6'
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build
      run: ./gradlew build --no-daemon
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: KillAura-Mod
        path: build/libs/*.jar
